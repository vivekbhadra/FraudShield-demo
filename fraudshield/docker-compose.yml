version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# FraudShield — Local Development Stack
#
# Usage:
#   docker compose up --build          # first run (builds images)
#   docker compose up                  # subsequent runs
#   docker compose down -v             # full teardown including volumes
#
# Startup order:
#   zookeeper → kafka → (postgres, redis in parallel) → app services
#
# Topic creation: KAFKA_AUTO_CREATE_TOPICS_ENABLE=true means topics are
# created automatically the first time a producer or consumer references them.
# No kafka-init container needed — eliminates all timing race conditions.
# ─────────────────────────────────────────────────────────────────────────────

networks:
  fraudshield-net:
    driver: bridge

volumes:
  postgres_transactions_data:
  postgres_fraud_data:
  redis_data:
  zookeeper_data:
  kafka_data:

services:

  # ── Zookeeper ────────────────────────────────────────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: fraudshield-zookeeper
    networks:
      - fraudshield-net
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 30 2>/dev/null || exit 1"]
      interval: 10s
      timeout: 15s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  # ── Kafka ────────────────────────────────────────────────────────────────────

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: fraudshield-kafka
    networks:
      - fraudshield-net
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181

      # Two listeners:
      #   PLAINTEXT       - used by other containers (kafka:29092)
      #   PLAINTEXT_HOST  - used from your host machine (localhost:9092)
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_MIN_INSYNC_REPLICAS: 1

      # Auto-create topics on first use — eliminates need for kafka-init
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: 3

      KAFKA_LOG_RETENTION_HOURS: 24
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # ── Databases ────────────────────────────────────────────────────────────────

  postgres-transactions:
    image: postgres:16-alpine
    container_name: fraudshield-postgres-transactions
    networks:
      - fraudshield-net
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: fraudshield
      POSTGRES_PASSWORD: fraudshield
      POSTGRES_DB: transactions_db
    volumes:
      - postgres_transactions_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudshield -d transactions_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  postgres-fraud:
    image: postgres:16-alpine
    container_name: fraudshield-postgres-fraud
    networks:
      - fraudshield-net
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: fraudshield
      POSTGRES_PASSWORD: fraudshield
      POSTGRES_DB: fraud_db
    volumes:
      - postgres_fraud_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraudshield -d fraud_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: fraudshield-redis
    networks:
      - fraudshield-net
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ── Application Services ─────────────────────────────────────────────────────

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: fraudshield-transaction-service
    networks:
      - fraudshield-net
    ports:
      - "8003:8003"
    depends_on:
      postgres-transactions:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fraudshield:fraudshield@postgres-transactions:5432/transactions_db
      KAFKA_BROKER: kafka:29092
      TOPIC_TRANSACTION_INITIATED: transactions.initiated
      TOPIC_FRAUD_VERDICT: fraud.verdict
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8003/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  fraud-detection-service:
    build:
      context: ./fraud-detection-service
      dockerfile: Dockerfile
    container_name: fraudshield-fraud-detection-service
    networks:
      - fraudshield-net
    ports:
      - "8004:8004"
    depends_on:
      postgres-fraud:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://fraudshield:fraudshield@postgres-fraud:5432/fraud_db
      REDIS_URL: redis://redis:6379/0
      KAFKA_BROKER: kafka:29092
      TOPIC_TRANSACTION_INITIATED: transactions.initiated
      TOPIC_FRAUD_VERDICT: fraud.verdict
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8004/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
