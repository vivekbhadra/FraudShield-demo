# ── PostgreSQL — Transactions DB ──────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-transactions-pvc
  namespace: fraudshield
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres-transactions
  namespace: fraudshield
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgres-transactions
  template:
    metadata:
      labels:
        app: postgres-transactions
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: fraudshield
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: fraudshield-secrets
                  key: postgres-password
            - name: POSTGRES_DB
              value: transactions_db
          volumeMounts:
            - name: postgres-transactions-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "fraudshield", "-d", "transactions_db"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-transactions-storage
          persistentVolumeClaim:
            claimName: postgres-transactions-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-transactions
  namespace: fraudshield
spec:
  selector:
    app: postgres-transactions
  ports:
    - port: 5432
      targetPort: 5432
  type: ClusterIP
---
